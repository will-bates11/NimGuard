name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Install Capstone
        run: sudo apt-get install -y libcapstone-dev

      - name: Install Keystone
        run: |
          if sudo apt-get install -y libkeystone-dev 2>/dev/null; then
            echo "Installed libkeystone-dev from apt"
          else
            echo "Building Keystone from source"
            sudo apt-get install -y cmake build-essential
            git clone --depth 1 https://github.com/keystone-engine/keystone.git /tmp/keystone
            cmake -S /tmp/keystone -B /tmp/keystone/build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=ON \
              -G "Unix Makefiles"
            cmake --build /tmp/keystone/build -j$(nproc)
            sudo cmake --install /tmp/keystone/build
            sudo ldconfig
          fi

      - name: Install Unicorn
        run: |
          if sudo apt-get install -y libunicorn-dev 2>/dev/null; then
            echo "Installed libunicorn-dev from apt"
          else
            echo "Building Unicorn from source"
            sudo apt-get install -y cmake build-essential python3
            git clone --depth 1 https://github.com/unicorn-engine/unicorn.git /tmp/unicorn
            cmake -S /tmp/unicorn -B /tmp/unicorn/build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=ON \
              -G "Unix Makefiles"
            cmake --build /tmp/unicorn/build -j$(nproc)
            sudo cmake --install /tmp/unicorn/build
            sudo ldconfig
          fi

      - name: Configure ptrace scope for tests
        run: echo 0 | sudo tee /proc/sys/kernel/yama/ptrace_scope

      - name: Build NimGuard
        run: nim c -d:release --path:src -o:nimguard src/nimguard.nim

      - name: Run patcher tests
        run: nim c -r --path:src tests/test_patcher.nim

      - name: Run binary parsing tests
        run: nim c -r --path:src tests/test_binary.nim

      - name: Run disassembler tests
        run: nim c -r --path:src tests/test_disassembler.nim

      - name: Run assembler tests
        run: nim c -r --path:src tests/test_assembler.nim

      - name: Run emulator tests
        run: nim c -r --path:src tests/test_emulator.nim

      - name: Run process tests
        run: nim c -r --path:src tests/test_process.nim

      - name: Run runtime tests
        run: nim c -r --path:src tests/test_runtime.nim

      - name: Run winprocess tests (stubs)
        run: nim c -r --path:src tests/test_winprocess.nim

      - name: Run winruntime tests (stubs)
        run: nim c -r --path:src tests/test_winruntime.nim

      - name: Run ARM support tests
        run: nim c -r --path:src tests/test_arm_support.nim

      - name: Run instrumentation tests
        run: nim c -r --path:src tests/test_instrumentation.nim

  build-and-test-windows:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Build NimGuard
        run: nim c -d:release --path:src -o:nimguard.exe src/nimguard.nim

      # Binary parsing is pure Nim with no C library dependencies.
      - name: Run binary parsing tests
        run: nim c -r --path:src tests/test_binary.nim

      # Windows-specific instrumentation tests.
      - name: Run winprocess tests
        run: nim c -r --path:src tests/test_winprocess.nim

      - name: Run winruntime tests
        run: nim c -r --path:src tests/test_winruntime.nim

      - name: Run ARM support tests
        run: nim c -r --path:src tests/test_arm_support.nim

      - name: Run instrumentation tests
        run: nim c -r --path:src tests/test_instrumentation.nim
